# Block private / sensitive content in public/.

# Block the old DOCX user guide that was briefly exposed at the site root.
[[redirects]]
  from = "/MINSANTE_v3_UserGuide_FR_EN.docx"
  to = "/404"
  status = 404
  force = true

# Block accidentally-deployed Electron development artifact
[[redirects]]
  from = "/downloads/FosaFinanceCalc_v2.2_ElectronPackage_clean/*"
  to = "/404"
  status = 404
  force = true
